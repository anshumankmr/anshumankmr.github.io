name: Build content JSON

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'scripts/**'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run generate

      - run: npm run validate

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: regenerate content JSON'
          file_pattern: 'generated/**'
